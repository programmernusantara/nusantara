name: Deploy Jaspr to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install Jaspr CLI
        run: dart pub global activate jaspr_cli

      - name: Build Jaspr
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          # Ganti '/nusantara/' sesuai dengan nama repository Anda di GitHub
          # Flag --base sangat penting agar logo dan navigasi tidak broken
          jaspr build --verbose --base /nusantara/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Jaspr static output secara default ada di folder ini
          path: 'build/jaspr'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4